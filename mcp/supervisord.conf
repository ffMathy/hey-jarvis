; WORKSPACE_ROOT must be set in the environment before launching supervisord.
; In Docker it is set via the ENV instruction; locally serve.sh exports it.

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord-hey-jarvis.pid
loglevel=info

[program:mastra-dev]
command=bun run %(ENV_WORKSPACE_ROOT)s/node_modules/.bin/mastra dev --dir %(ENV_WORKSPACE_ROOT)s/mcp/mastra
directory=%(ENV_WORKSPACE_ROOT)s
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=3
priority=1

[program:mcp-server]
command=bun %(ENV_WORKSPACE_ROOT)s/mcp/mastra/mcp-server.ts
directory=%(ENV_WORKSPACE_ROOT)s
environment=PORT="4112",HOST="0.0.0.0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=3
priority=2
